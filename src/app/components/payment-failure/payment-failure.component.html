<section class="status-page">
  <mat-card class="status-card failure">
    <div class="status-icon">!</div>
    <h2>Payment Failed</h2>
    <p>Your payment could not be completed. Please try again from the cart.</p>
    <div class="status-actions">
      <button mat-raised-button color="primary" routerLink="/cart">Back to Cart</button>
      <button mat-stroked-button routerLink="/products">Continue Shopping</button>
    </div>
  </mat-card>
</section>
