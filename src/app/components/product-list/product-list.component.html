<div class="container">

  <mat-card>
    <h2>Products</h2>

    <table mat-table [dataSource]="products" class="mat-elevation-z8 full-width">

      <!-- Name -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef> Name </th>
        <td mat-cell *matCellDef="let p"> {{p.name}} </td>
      </ng-container>

      <!-- Price -->
      <ng-container matColumnDef="price">
        <th mat-header-cell *matHeaderCellDef> Price </th>
        <td mat-cell *matCellDef="let p"> ₹{{p.price}} </td>
      </ng-container>

      <!-- Description -->
      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef> Description </th>
        <td mat-cell *matCellDef="let p"> {{p.description}} </td>
      </ng-container>

      <!-- Stock -->
      <ng-container matColumnDef="stock">
        <th mat-header-cell *matHeaderCellDef> Stock </th>
        <td mat-cell *matCellDef="let p"> {{p.stock}} </td>
      </ng-container>

      <!-- Action -->
      <ng-container matColumnDef="action">
        <th mat-header-cell *matHeaderCellDef> Action </th>
        <td mat-cell *matCellDef="let p">
          <button mat-raised-button color="warn" (click)="delete(p.id!)">
            Delete
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="['name','price','description','stock','action']"></tr>
      <tr mat-row *matRowDef="let row; columns: ['name','price','description','stock','action'];"></tr>

    </table>

  </mat-card>

</div>
