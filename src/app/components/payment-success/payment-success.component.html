<section class="status-page">
  <mat-card class="status-card success">
    <div class="status-icon">✓</div>
    <h2>Payment Successful</h2>
    <p>Your order has been confirmed and your cart has been updated.</p>
    <div class="status-actions">
      <button mat-raised-button color="primary" routerLink="/products">Continue Shopping</button>
      <button mat-stroked-button routerLink="/cart">View Cart</button>
    </div>
  </mat-card>
</section>
