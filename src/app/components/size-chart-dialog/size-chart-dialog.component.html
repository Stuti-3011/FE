<div class="dialog-shell">
  <div class="dialog-header">
    <div>
      <p>Fit guide</p>
      <h2>Size chart</h2>
    </div>
    <button mat-icon-button (click)="close()" aria-label="Close size chart">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Size</th>
          <th>Chest (in)</th>
          <th>Waist (in)</th>
          <th>Hip (in)</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let row of rows">
          <td>{{ row.size }}</td>
          <td>{{ row.chest }}</td>
          <td>{{ row.waist }}</td>
          <td>{{ row.hip }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
