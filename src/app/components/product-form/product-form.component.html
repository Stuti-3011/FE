<mat-card class="form-card">
  <div class="form-heading">
    <p>Admin catalog</p>
    <h2>Add Product</h2>
  </div>

  <div *ngIf="errorMessage" class="error-message">
    {{ errorMessage }}
  </div>

  <form [formGroup]="productForm" (ngSubmit)="submit()">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Product Name</mat-label>
      <input matInput formControlName="name" required>
    </mat-form-field>

    <div class="form-grid">
      <mat-form-field appearance="outline">
        <mat-label>Price</mat-label>
        <input matInput type="number" formControlName="price" required>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Stock</mat-label>
        <input matInput type="number" formControlName="stock" required>
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Description</mat-label>
      <textarea matInput rows="4" formControlName="description"></textarea>
    </mat-form-field>

    <label class="upload-zone">
      <mat-icon>add_photo_alternate</mat-icon>
      <strong>Upload product images</strong>
      <span>Choose up to {{ maxImages }} images. The first image remains the main product image.</span>
      <input type="file" accept="image/*" multiple (change)="onFileSelected($event)">
    </label>

    <div class="preview-grid" *ngIf="imagePreviews.length">
      <div class="preview" *ngFor="let preview of imagePreviews; let i = index">
        <img [src]="preview" alt="Selected product preview">
        <span *ngIf="i === 0">Main</span>
      </div>
    </div>

    <button mat-raised-button color="primary" type="submit" class="full-width submit-button">
      Add Product
    </button>
  </form>
</mat-card>
