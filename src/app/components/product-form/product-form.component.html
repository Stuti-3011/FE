<div class="container">

  <mat-card class="form-card">
    <h2>Add Product</h2>

    <form (ngSubmit)="addProduct()" #productForm="ngForm">

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Product Name</mat-label>
        <input matInput name="name" [(ngModel)]="product.name" required>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Price</mat-label>
        <input matInput type="number" name="price" [(ngModel)]="product.price" required>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Description</mat-label>
        <input matInput name="description" [(ngModel)]="product.description">
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Stock</mat-label>
        <input matInput type="number" name="stock" [(ngModel)]="product.stock" required>
      </mat-form-field>

      <button mat-raised-button color="primary" class="full-width" type="submit">
        Add Product
      </button>

    </form>

  </mat-card>

</div>
