<mat-toolbar color="primary" class="toolbar">
  <a class="logo" routerLink="/products">ShopEase</a>

  <label class="search-box" aria-label="Search products">
    <mat-icon>search</mat-icon>
    <input
      [formControl]="searchControl"
      placeholder="Search for products..." />
    <button
      *ngIf="searchControl.value"
      type="button"
      class="clear-search"
      aria-label="Clear search"
      (click)="clearSearch()">
      <mat-icon>close</mat-icon>
    </button>
  </label>

  <span class="spacer"></span>

  <button mat-button class="nav-link" routerLink="/products">Products</button>

  <button mat-button class="nav-link" *ngIf="isAdmin()" routerLink="/add">
    Add Product
  </button>

  <div class="icons">
    <button mat-icon-button class="icon-button" routerLink="/wishlist" [matBadge]="wishlistCount" [matBadgeHidden]="wishlistCount === 0" matBadgeColor="warn" aria-label="Wishlist">
      <mat-icon>favorite_border</mat-icon>
    </button>

    <button mat-icon-button class="icon-button" routerLink="/cart" [matBadge]="cartCount" [matBadgeHidden]="cartCount === 0" matBadgeColor="warn" aria-label="Cart">
      <mat-icon>shopping_cart</mat-icon>
    </button>

    <button type="button" class="profile" *ngIf="isLoggedIn()" (click)="toggleDropdown()" aria-label="Open profile menu">
      <mat-icon>account_circle</mat-icon>

      <div class="dropdown" *ngIf="showDropdown">
        <button type="button" (click)="goToProfile()">Profile</button>
        <button type="button" (click)="logout()">Logout</button>
      </div>
    </button>

    <button mat-button class="login-button" *ngIf="!isLoggedIn()" routerLink="/login">
      Login
    </button>
  </div>
</mat-toolbar>

<div class="main-container">
  <router-outlet></router-outlet>
</div>

<footer class="footer">
  <div class="footer-container">
    <div class="footer-section">
      <h3>ShopEase</h3>
      <p>Your one-stop shop for all your needs.</p>
    </div>

    <div class="footer-section">
      <h4>Quick Links</h4>
      <p>Home</p>
      <p>Products</p>
      <p>About Us</p>
      <p>Contact</p>
    </div>

    <div class="footer-section">
      <h4>Contact Us</h4>
      <p>Valsad, Gujarat</p>
      <p>+91 98765 43210</p>
      <p>support&#64;shopease.com</p>
    </div>

    <div class="footer-section">
      <h4>Follow Us</h4>
      <p>Instagram</p>
      <p>Facebook</p>
      <p>Twitter</p>
    </div>
  </div>

  <div class="footer-bottom">
    Copyright 2026 ShopEase. All rights reserved.
  </div>
</footer>
